<!DOCTYPE html>
<html>
<head>
    <title>30sAI Streaming Transcriber</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            margin: 0 0 10px 0;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #218838;
        }
        .transcription-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 150px;
        }
        .transcription-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        .recording { background: #fff3cd; color: #856404; }
        .recording-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 1s infinite;
            margin-right: 8px;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 30sAI Streaming Transcriber</h1>
        <p>Real-time speech-to-text powered by Whisper</p>
        
        <div>
            <button id="connectBtn" class="btn-primary" onclick="connect()">🔌 Connect</button>
            <button id="recordBtn" class="btn-success" onclick="toggleRecording()" disabled>🎤 Start Recording</button>
        </div>
        
        <div class="transcription-box">
            <div id="transcription" class="transcription-text">Waiting for connection...</div>
        </div>
        
        <div id="status" class="status disconnected">Status: Disconnected</div>
    </div>

    <script>
        let ws = null;
        let isRecording = false;
        let audioContext = null;
        let processor = null;
        let stream = null;
        
        const wsUrl = `ws://${window.location.host}/ws`;
        
        function updateStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = `Status: ${message}`;
            statusDiv.className = `status ${type}`;
        }
        
        function updateTranscription(text, isPartial = true) {
            const div = document.getElementById('transcription');
            div.innerHTML = text || '...';
            if (isPartial) {
                div.style.color = '#666';
                div.style.fontStyle = 'italic';
            } else {
                div.style.color = '#333';
                div.style.fontStyle = 'normal';
            }
        }
        
        async function connect() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    updateStatus('Connected', 'connected');
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('recordBtn').disabled = false;
                    updateTranscription('Ready to record...', false);
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.text) {
                        updateTranscription(data.text, !data.final);
                    }
                };
                
                ws.onclose = () => {
                    updateStatus('Disconnected', 'disconnected');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('recordBtn').disabled = true;
                    document.getElementById('recordBtn').textContent = '🎤 Start Recording';
                    isRecording = false;
                    updateTranscription('Disconnected', false);
                };
                
                ws.onerror = () => {
                    updateStatus('Connection error', 'disconnected');
                };
                
            } catch (error) {
                updateStatus('Connection failed', 'disconnected');
            }
        }
        
        async function startRecording() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Please connect first');
                return;
            }
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                
                const source = audioContext.createMediaStreamSource(stream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                processor.onaudioprocess = (event) => {
                    if (!isRecording) return;
                    
                    const inputData = event.inputBuffer.getChannelData(0);
                    const int16Data = new Int16Array(inputData.length);
                    
                    for (let i = 0; i < inputData.length; i++) {
                        int16Data[i] = Math.max(-32768, Math.min(32767, Math.floor(inputData[i] * 32767)));
                    }
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(int16Data.buffer);
                    }
                };
                
                isRecording = true;
                document.getElementById('recordBtn').textContent = '⏹️ Stop Recording';
                updateStatus('Recording... <span class="recording-indicator"></span>', 'recording');
                updateTranscription('Listening...', true);
                
            } catch (error) {
                alert('Could not access microphone');
                console.error(error);
            }
        }
        
        function stopRecording() {
            isRecording = false;
            document.getElementById('recordBtn').textContent = '🎤 Start Recording';
            updateStatus('Processing final...', 'connected');
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'finalize' }));
            }
            
            // Cleanup
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
            if (stream) stream.getTracks().forEach(track => track.stop());
            
            processor = null;
            audioContext = null;
            stream = null;
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        // Auto-connect on page load
        window.addEventListener('load', connect);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (stream) stream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
